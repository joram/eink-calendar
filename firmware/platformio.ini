; Waveshare E-Paper ESP32 Driver Board + 7.5" (B) V2 — on-device render
; https://www.waveshare.com/wiki/E-Paper_ESP32_Driver_Board

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
; Omit upload_port / monitor_port so PlatformIO picks the ESP32 (often /dev/ttyACM0).
; Override e.g.: pio run -t upload --upload-port /dev/ttyACM0

lib_deps =
    adafruit/Adafruit GFX Library@^1.11.9
    adafruit/Adafruit BusIO@^1.14.5
    bblanchon/ArduinoJson@^7.2.0

build_flags =
    -DCORE_DEBUG_LEVEL=0
